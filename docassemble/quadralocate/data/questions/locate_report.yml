# list collect: True gathers all items on one screen, so there_is_another is always False.
# Without this block, gather() cannot resolve there_is_another on re-evaluation.
code: |
  report.time_entries.there_is_another = False
---
# Define DADict gathering for Table 2
code: |
  report.time_entries[i].hours.there_are_any = True
---
# Build work_days and technicians from time_entries (for report/PDF)
code: |
  if not report.job.work_days.has_been_gathered():
    from docassemble.quadralocate.objects import HOUR_TYPES, HoursDict
    dates_seen = []
    for entry in report.time_entries:
      d = entry.date
      if d not in dates_seen:
        dates_seen.append(d)
    for d in dates_seen:
      day = report.job.work_days.appendObject()
      day.date = d
      day_entries = [e for e in report.time_entries if e.date == d]
      if day_entries:
        starts = [e.start_time for e in day_entries if e.start_time]
        ends = [e.end_time for e in day_entries if e.end_time]
        if starts:
          day.start_time = min(starts)
        if ends:
          day.end_time = max(ends)
      day.weather = report.weather
      tech_names = []
      for e in day_entries:
        if e.technician_name and e.technician_name not in tech_names:
          tech_names.append(e.technician_name)
      for name in tech_names:
        tech_entries = [e for e in day_entries if e.technician_name == name]
        hours_vals = {}
        for ht in HOUR_TYPES:
          if ht == 'two_hr_min':
            hours_vals[ht] = any(e.hours.get(ht) for e in tech_entries)
          else:
            hours_vals[ht] = sum(float(e.hours.get(ht, 0) or 0) for e in tech_entries)
        tech = day.technicians.appendObject()
        tech.name = name
        if tech_entries:
          tech.start_time = tech_entries[0].start_time
          tech.end_time = tech_entries[-1].end_time
        tech.hours = HoursDict(hours_vals)
      # Set gathered AFTER all appendObject() calls — appendObject() resets it (ISS-016)
      day.technicians.gathered = True
    # Set gathered BEFORE len() — len() on an un-gathered DAList triggers the gather
    # protocol which asks there_is_another, causing the lookup error (ISS-016).
    report.job.work_days.gathered = True
    report.job.is_multi_day = (len(report.job.work_days) > 1)
  time_entries_built = True
---
# Satisfy lookup for work_days[i].technicians[j].hours.there_are_any (docassemble seeks a defining block).
# Must NOT depend on time_entries_built — that creates a circular dependency because the
# build code itself creates Technician objects whose init() accesses the hours DADict.
code: |
  report.job.work_days[i].technicians[j].hours.there_are_any = True
---
# Manually-built lists need there_is_another = False so the gather protocol can
# complete if triggered by len(), iteration, or re-evaluation (ISS-016).
code: |
  report.job.work_days.there_is_another = False
---
code: |
  report.job.work_days[i].technicians.there_is_another = False
---
