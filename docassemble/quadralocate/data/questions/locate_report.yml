  **Client:** ${ report.client_company }
  
  **Site:** ${ report.site_address }
  
  % if report.revision_number > 0:
  *This is revision #${ report.revision_number }*
  % endif
  
  ---
  
  Download your report:
  
  ${ action_button_html(url_action('download_report'), label='Download PDF Report', icon='download', color='primary', size='lg') }
  
  % if DropboxService.is_configured() and DropboxService.is_linked():
  ${ action_button_html(url_action('save_to_dropbox'), label='Save to Dropbox', icon='cloud-upload-alt', color='info', size='lg') }
  % elif DropboxService.is_configured():
  <small class="text-muted"><i class="fab fa-dropbox"></i> <a href="${ interview_url(i='docassemble.quadralocate:data/questions/dashboard.yml') }">Link your Dropbox</a> to save reports directly to your cloud.</small>
  % endif
  
  ---
  
  ${ action_button_html(url_action('edit_report'), label='Edit This Report', icon='edit', color='secondary') }
  ${ action_button_html(url_action('new_report'), label='Start New Report', icon='plus', color='secondary') }
  
  <div style="margin-top: 1rem;">
    <a href="${ interview_url(i='docassemble.quadralocate:data/questions/dashboard.yml') }" class="btn btn-outline-dark btn-sm">
      <i class="fas fa-tachometer-alt"></i>&nbsp; Back to Dashboard
    </a>
  </div>
buttons:
  - Exit: exit
section: review
---
# ============================================
# PDF TEMPLATE ATTACHMENTS (one per page type)
# ============================================
# Cover page
attachment:
  variable name: cover_pdf
  name: Cover Page
  filename: cover
  pdf template file: cover_page.pdf
  code: report.get_cover_fields()
---
# Report page
attachment:
  variable name: report_pdf
  name: Report Page
  filename: report
  pdf template file: report_page.pdf
  code: report.get_report_fields()
---
# Report continuation pages (indexed; added only when overflow exists)
attachment:
  variable name: report.cont_pages[i].filled_pdf
  name: Report Continuation ${ i + 1 }
  filename: report_cont_${ i + 1 }
  pdf template file: report_page_cont.pdf
  code: report.get_report_cont_fields(i)
---
# Backward-compatibility alias for legacy sessions that still reference
# report_cont_page_pdf[i] from pre-1.5.19 interview state.
attachment:
  variable name: report_cont_page_pdf[i]
  name: Report Continuation Legacy ${ i + 1 }
  filename: report_cont_legacy_${ i + 1 }
  pdf template file: report_page_cont.pdf
  code: report.get_report_cont_fields(i)
---
# Photo pages (indexed — one per photo page with content)
attachment:
  variable name: report.photo_pages[i].filled_pdf
  name: Photo Page ${ i + 1 }
  filename: photo_page_${ i + 1 }
  pdf template file: photo_page.pdf
  code: report.photo_pages[i].get_photo_fields(i, report.quadra_job_number)
---
# Drawing pages — letter format
attachment:
  variable name: report.drawings[i].filled_pdf_letter
  name: Drawing ${ i + 1 }
  filename: drawing_${ i + 1 }
  pdf template file: drawing_page_letter.pdf
  code: report.drawings[i].get_drawing_fields(report.quadra_job_number)
---
# Drawing pages — wide/tabloid format
attachment:
  variable name: report.drawings[i].filled_pdf_wide
  name: Drawing ${ i + 1 }
  filename: drawing_${ i + 1 }
  pdf template file: drawing_page_wide.pdf
  code: report.drawings[i].get_drawing_fields(report.quadra_job_number)
---
# ============================================
# DOWNLOAD — Assemble all pages via pdf_concatenate
# ============================================
event: download_report
code: |
  from docassemble.base.util import pdf_concatenate, DAStaticFile
  
  parts = [cover_pdf.pdf, report_pdf.pdf]

  # Report continuation pages (overflow from combined report, then billing details)
  for idx in range(len(report.get_report_cont_pages())):
    parts.append(report.cont_pages[idx].filled_pdf.pdf)
  
  # Photo pages — only include pages that have at least one photo
  for idx, page in enumerate(report.photo_pages):
    if page.has_content():
      parts.append(page.filled_pdf.pdf)
  
  # Drawing pages — select letter or wide template based on format
  # (bounded by user-selected count, so reduced counts do not export stale pages)
  for idx in range(report.num_drawings if defined('report.num_drawings') else 0):
    drawing = report.drawings[idx]
    if hasattr(drawing, 'file') and drawing.file:
      if drawing.is_large_format():
        parts.append(drawing.filled_pdf_wide.pdf)
      else:
        parts.append(drawing.filled_pdf_letter.pdf)
  
  # Legend page (static — no form fields)
  parts.append(DAStaticFile(filename='data/static/legend_page.pdf'))
  
  export_name = report.get_export_filename()
  final_report = pdf_concatenate(*parts, filename=export_name)
  # Revert to known-safe response wiring to avoid file-not-found regressions.
  final_report.set_attributes(filename=export_name)
  response(file=final_report, filename=export_name, content_type='application/pdf')
---
# WARNING: revision_number increment is not atomic. If multiple users
# trigger this event simultaneously, the count may be incorrect.
# Acceptable for current single-user usage; revisit if concurrent editing is needed.
event: edit_report
code: |
  report.revision_number += 1
  # ── Invalidate cached PDF attachments so they regenerate with updated data ──
  if defined('cover_pdf'):
    undefine('cover_pdf')
  if defined('report_pdf'):
    undefine('report_pdf')
  # Indexed report continuation PDFs
  for _idx in range(len(report.get_report_cont_pages())):
    _attr = 'report.cont_pages[' + str(_idx) + '].filled_pdf'
    if defined(_attr):
      undefine(_attr)
  # Indexed photo page PDFs
  for _idx in range(len(report.photo_pages)):
    _attr = 'report.photo_pages[' + str(_idx) + '].filled_pdf'
    if defined(_attr):
      undefine(_attr)
  # Indexed drawing PDFs
  if defined('report.num_drawings'):
    for _idx in range(report.num_drawings):
      for _suffix in ['filled_pdf_letter', 'filled_pdf_wide']:
        _attr = 'report.drawings[' + str(_idx) + '].' + _suffix
        if defined(_attr):
          undefine(_attr)
  # ── Force rebuild of work_days from (possibly edited) time entries ──
  if defined('time_entries_built'):
    undefine('time_entries_built')
    report.job.work_days.clear()
    report.job.work_days.gathered = False
    report.job.work_days.there_are_any = False
  # ── Re-show review screen ──
  review_complete = False
  force_ask('review_complete')
---
event: new_report
code: |
  command('new_session')
---
# ============================================
# DROPBOX — Save PDF to linked Dropbox account
# ============================================
event: save_to_dropbox
code: |
  # Upload the archived PDF to the user's linked Dropbox.
  # Filename uses the standard export format: "YYYY-MM-DD Client Address QJN.pdf"
  _db_filename = report.get_export_filename()
  _db_folder = '/Quadra Reports'
  _db_path = _db_folder + '/' + _db_filename
  _archived_path = ReportArchiver.get_archived_path(report.quadra_job_number)
  if _archived_path:
    _db_ok = DropboxService.upload_file(_archived_path, _db_path)
  else:
    # Fallback: generate PDF on-the-fly
    from docassemble.base.util import pdf_concatenate, DAStaticFile
    _db_parts = [cover_pdf.pdf, report_pdf.pdf]
    for _di in range(len(report.get_report_cont_pages())):
      _db_parts.append(report.cont_pages[_di].filled_pdf.pdf)
    for _di2, _dp in enumerate(report.photo_pages):
      if _dp.has_content():
        _db_parts.append(_dp.filled_pdf.pdf)
    for _di3 in range(report.num_drawings if defined('report.num_drawings') else 0):
      _dd = report.drawings[_di3]
      if hasattr(_dd, 'file') and _dd.file:
        if _dd.is_large_format():
          _db_parts.append(_dd.filled_pdf_wide.pdf)
        else:
          _db_parts.append(_dd.filled_pdf_letter.pdf)
    _db_parts.append(DAStaticFile(filename='data/static/legend_page.pdf'))
    _db_pdf = pdf_concatenate(*_db_parts, filename=_db_filename)
    _db_ok = DropboxService.upload_file(_db_pdf, _db_path)
  dropbox_last_result = 'success' if _db_ok else 'failed'
  dropbox_last_path = _db_path
  force_ask('dropbox_result_screen')
---
event: dropbox_result_screen
question: |
  % if dropbox_last_result == 'success':
  <i class="fab fa-dropbox" style="color:#0061FF;"></i> Saved to Dropbox
  % else:
  <i class="fas fa-exclamation-triangle" style="color:#dc3545;"></i> Dropbox Upload Failed
  % endif
subquestion: |
  % if dropbox_last_result == 'success':
  Your report has been saved to:
  
  **${ dropbox_last_path }**
  
  You can find it in your Dropbox under the *Quadra Reports* folder.
  % else:
  There was a problem uploading to Dropbox. Please check your connection
  in the Dashboard and try again.
  % endif
buttons:
  - Back to Report: final_screen
---
# ============================================
# SAVE PROGRESS FOR MULTI-DAY
# ============================================
question: |
  Save Progress
subquestion: |
  Your progress has been saved.
  
  **Job Number:** ${ report.quadra_job_number }
  
  Share this job number with the next technician to continue the report.
  
  You can resume this report at any time by selecting "Resume Existing Job" 
  and entering the job number.
field: progress_saved
buttons:
  - Continue Working: continue
  - Save and Exit: exit
