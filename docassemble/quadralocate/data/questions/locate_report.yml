# UTILITY MATRIX
# ============================================
# Initialize each utility (key, display_name, available_methods) after report.utilities
# exists; do not do this in UtilityMatrix.init() or we get report <-> x.electrical loop.
code: |
  for key, display_name, methods in report.utilities.UTILITY_TYPES:
    u = getattr(report.utilities, key)
    u.key = key
    u.display_name = display_name
    u.available_methods = methods
