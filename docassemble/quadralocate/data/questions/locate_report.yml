  ### Billing Details
  
  ```
  ${ report.format_billing_details() }
  ```
  
  ### Utilities Located
  
  % for utility in report.utilities.get_active_utilities():
  - **${ utility.format_header() }**
  % endfor
  
  % if report.hydrovac.recommended:
