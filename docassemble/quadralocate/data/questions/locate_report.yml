# ============================================
# GENERATE REPORT
# ============================================
mandatory: True
code: |
  report_action
  report.client_company
  report.quadra_job_number
  report.site_address
  report.site_visit_date
  report.bc1_provider
  report.technician_name
  report.client_rep_name
  
  # Time entries (Table 1 — list collect handles gathering)
  report.time_entries.gather()
  
  # Weather (must be defined before time_entries_built)
  report.weather
  
  # Time entries (Table 2 — hour breakdown per entry)
  for idx in range(len(report.time_entries)):
    report.time_entries[idx].hours_entered
  
  # Build work_days from time entries (all data now available)
  time_entries_built
  
  # Supplemental charges and materials
  report.supp_parking
  report.mat_pin_flags
  
  report.property_type
  
  # Utilities (initialize matrix children after report.utilities exists to avoid loop)
  utilities_matrix_initialized
  report.utilities.electrical.methods['em']
  report.utilities.communications.methods['em']
  report.utilities.gas.methods['em']
  report.utilities.water.methods['em']
  report.utilities.storm.methods['em']
  report.utilities.sanitary.methods['em']
  report.utilities.ditch.methods['visual']
  report.utilities.unknown.methods['em']
  
  # Missing docs (must be gathered before utility detail conditions)
  report.missing_docs['hydro']
  
  # Summary of work (before site conditions)
  report.work_summary
  
  # Site conditions and travel notes
  report.site_conditions
  report.travel_notes
  
  # Conditional utility details (include missing-doc mapped utilities; skip not-in-scope)
  if (report.utilities.electrical.has_any_method() or bool(report.get_missing_doc_labels_for_utility('electrical'))) and not report.utilities.electrical.is_not_in_scope():
    report.utilities.electrical.summary
  if (report.utilities.communications.has_any_method() or bool(report.get_missing_doc_labels_for_utility('communications'))) and not report.utilities.communications.is_not_in_scope():
    report.utilities.communications.summary
  if (report.utilities.gas.has_any_method() or bool(report.get_missing_doc_labels_for_utility('gas'))) and not report.utilities.gas.is_not_in_scope():
    report.utilities.gas.summary
  if (report.utilities.water.has_any_method() or bool(report.get_missing_doc_labels_for_utility('water'))) and not report.utilities.water.is_not_in_scope():
    report.utilities.water.summary
  if (report.utilities.storm.has_any_method() or bool(report.get_missing_doc_labels_for_utility('storm'))) and not report.utilities.storm.is_not_in_scope():
    report.utilities.storm.summary
  if (report.utilities.sanitary.has_any_method() or bool(report.get_missing_doc_labels_for_utility('sanitary'))) and not report.utilities.sanitary.is_not_in_scope():
    report.utilities.sanitary.summary
  if report.utilities.unknown.has_any_method() and not report.utilities.unknown.is_not_in_scope():
    report.utilities.unknown.summary
  
  # Hydrovac
  report.hydrovac.recommended
  if report.hydrovac.recommended:
    report.hydrovac.reasons['obstructions']
  
  # Recommendations
  report.recommendations
  
  # Cover photo (optional, for cover page template)
  report.cover_photo_complete
  
  # Photos (manual loop — avoids DAList gather protocol)
  report.photo_pages[0].page_complete
  photo_idx = 0
  while report.photo_pages[photo_idx].add_another:
    photo_idx += 1
    report.photo_pages[photo_idx].page_complete
  report.photo_pages.gathered = True
  
  # Drawings
  report.num_drawings
  if report.num_drawings > 0:
    for idx in range(report.num_drawings):
      report.drawings[idx].file
    report.drawings.gathered = True
  
  # Review
  review_complete
  
  # Tag session as completed for dashboard
  session_tagged_complete
  
  final_screen
---
code: |
  # Mark session as completed for dashboard (runs once when final_screen is needed)
  session_tags().add('completed')
  
  # Archive the PDF to server filesystem for persistent access (map pins, etc.)
  # This generates the full PDF and saves a copy — separate from the download event.
  try:
    from docassemble.base.util import pdf_concatenate, DAStaticFile
    _archive_parts = [cover_pdf.pdf, report_pdf.pdf]
    for _aidx in range(len(report.get_report_cont_pages())):
      _archive_parts.append(report.cont_pages[_aidx].filled_pdf.pdf)
    for _aidx, _apage in enumerate(report.photo_pages):
      if _apage.has_content():
        _archive_parts.append(_apage.filled_pdf.pdf)
    for _aidx in range(report.num_drawings if defined('report.num_drawings') else 0):
      _adrawing = report.drawings[_aidx]
      if hasattr(_adrawing, 'file') and _adrawing.file:
        if _adrawing.is_large_format():
          _archive_parts.append(_adrawing.filled_pdf_wide.pdf)
        else:
          _archive_parts.append(_adrawing.filled_pdf_letter.pdf)
    _archive_parts.append(DAStaticFile(filename='data/static/legend_page.pdf'))
    _archived_pdf = pdf_concatenate(*_archive_parts, filename=report.get_export_filename())
    ReportArchiver.archive_pdf(_archived_pdf, report.quadra_job_number)
  except Exception as _archive_err:
    log('ReportArchiver: failed during finalization: ' + str(_archive_err), 'warning')
  
  # Save a map pin for this job (geocode address + store record)
  try:
    JobMapService.save_job_pin(report)
  except Exception as _map_err:
    log('JobMapService: failed during finalization: ' + str(_map_err), 'warning')
  
  session_tagged_complete = True
