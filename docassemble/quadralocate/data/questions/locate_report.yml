code: |
  # Build subtitle with job info for dashboard parsing.
  # Format: "job_number | client_company | site_address | date"
  # The dashboard splits on " | " to extract each field.
  _sub = []
  if defined('report.quadra_job_number'):
    _sub.append(str(report.quadra_job_number))
  else:
    _sub.append('New Report')
  if defined('report.client_company'):
    _sub.append(str(report.client_company))
  if defined('report.site_address'):
    _sub.append(str(report.site_address).replace('\n', ' ').replace('\r', ' ')[:60])
  if defined('report.site_visit_date'):
    _sub.append(format_date(report.site_visit_date, format='yyyy-MM-dd'))
  set_parts(subtitle=' | '.join(_sub))
