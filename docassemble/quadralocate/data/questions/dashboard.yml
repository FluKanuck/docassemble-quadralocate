---
metadata:
  title: Quadra Tech Dashboard
  short title: Dashboard
  description: Technician dashboard for Quadra Utility Locating
  authors:
    - name: Quadra Utility Locating Ltd.
  temporary session: True
---
modules:
  - docassemble.quadralocate.objects
---
features:
  navigation: False
  progress bar: False
  question back button: False
  css: |
    <style>
      .da-page-header { display: none; }
      .da-subquestion { max-width: 1100px; margin: 0 auto; }
      .dash-header {
        background: linear-gradient(135deg, #1a3a5c 0%, #2d5f8a 100%);
        color: white;
        padding: 2rem 2rem 1.5rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
      }
      .dash-header h1 { margin: 0 0 0.25rem; font-size: 1.75rem; font-weight: 700; }
      .dash-header p { margin: 0; opacity: 0.85; font-size: 0.95rem; }
      .dash-actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
      }
      .dash-actions .btn { border-radius: 8px; font-weight: 600; padding: 0.6rem 1.25rem; }
      .dash-card {
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 1rem 1.25rem;
        margin-bottom: 0.75rem;
        background: #fff;
        transition: box-shadow 0.15s;
      }
      .dash-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
      .dash-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      .dash-card-header h5 { margin: 0; font-weight: 600; color: #1a3a5c; }
      .dash-badge {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .badge-completed { background: #d4edda; color: #155724; }
      .badge-inprogress { background: #fff3cd; color: #856404; }
      .dash-card-meta { font-size: 0.875rem; color: #6c757d; margin-bottom: 0.5rem; }
      .dash-card-meta span { margin-right: 1rem; }
      .dash-card-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .dash-card-actions .btn { font-size: 0.85rem; padding: 0.3rem 0.75rem; border-radius: 6px; }
      .dash-empty {
        text-align: center;
        padding: 3rem 1rem;
        color: #6c757d;
      }
      .dash-empty i { font-size: 3rem; margin-bottom: 1rem; display: block; opacity: 0.4; }
      .dash-section-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: #333;
        margin-bottom: 0.75rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #e2e8f0;
      }
    </style>
---
mandatory: True
code: |
  dashboard_screen
---
event: dashboard_screen
question: |
  &nbsp;
subquestion: |
  <div class="dash-header">
    <h1><i class="fas fa-hard-hat"></i>&nbsp; Quadra Tech Dashboard</h1>
    <p>Welcome, ${ user_info().first_name or 'Technician' }. Manage your locate reports below.</p>
  </div>

  <div class="dash-actions">
    <a href="${ interview_url(i='docassemble.quadralocate:data/questions/locate_report.yml', new_session=1) }" class="btn btn-primary">
      <i class="fas fa-plus"></i>&nbsp; Start New Report
    </a>
    <a href="${ interview_url(i='docassemble.quadralocate:data/questions/job_map.yml') }" class="btn btn-outline-secondary">
      <i class="fas fa-map-marked-alt"></i>&nbsp; Job Map
    </a>
  </div>

  <%
    # Fetch all sessions for the Locate Report interview belonging to this user.
    # Each session's subtitle is formatted as:
    #   "job_number | client_company | site_address | date"
    # The 'completed' tag is added when the report reaches final_screen.
    # interview_list() returns (list, next_id) tuple — use first element
    _raw_result = interview_list(
      filename='docassemble.quadralocate:data/questions/locate_report.yml',
      exclude_invalid=True
    )
    raw_sessions = _raw_result[0] if isinstance(_raw_result, (list, tuple)) and len(_raw_result) > 0 else (_raw_result if isinstance(_raw_result, list) else [])

    completed = []
    in_progress = []
    for s in raw_sessions:
      subtitle = s.get('subtitle', '') or ''
      parts = [p.strip() for p in subtitle.split(' | ')]
      tags = s.get('tags', set()) or set()
      is_completed = 'completed' in tags

      info = {
        'session': s.get('session', ''),
        'modtime': s.get('modtime', ''),
        'job_number': parts[0] if len(parts) > 0 else '',
        'client': parts[1] if len(parts) > 1 else '',
        'address': parts[2] if len(parts) > 2 else '',
        'date': parts[3] if len(parts) > 3 else '',
      }

      if is_completed:
        completed.append(info)
      else:
        in_progress.append(info)
  %>

  % if in_progress:
  <div class="dash-section-title"><i class="fas fa-spinner"></i>&nbsp; In Progress</div>
  % for item in in_progress:
  <div class="dash-card">
    <div class="dash-card-header">
      <h5>${ item['job_number'] or 'New Report' }</h5>
      <span class="dash-badge badge-inprogress">In Progress</span>
    </div>
    <div class="dash-card-meta">
      % if item['client']:
      <span><i class="fas fa-building"></i>&nbsp; ${ item['client'] }</span>
      % endif
      % if item['address']:
      <span><i class="fas fa-map-marker-alt"></i>&nbsp; ${ item['address'][:60] }</span>
      % endif
      % if item['date']:
      <span><i class="fas fa-calendar"></i>&nbsp; ${ item['date'] }</span>
      % endif
    </div>
    <div class="dash-card-actions">
      <a href="${ interview_url(i='docassemble.quadralocate:data/questions/locate_report.yml', session=item['session']) }" class="btn btn-sm btn-primary">
        <i class="fas fa-play"></i>&nbsp; Resume
      </a>
    </div>
  </div>
  % endfor
  % endif

  % if completed:
  <div class="dash-section-title" style="margin-top: 1.5rem;"><i class="fas fa-check-circle"></i>&nbsp; Completed Reports</div>
  % for item in completed:
  <%
    # Build card title: "date client address job_number"
    _title_parts = []
    if item['date']:
      _title_parts.append(item['date'])
    if item['client']:
      _title_parts.append(item['client'])
    if item['address']:
      _title_parts.append(item['address'][:50])
    if item['job_number']:
      _title_parts.append(item['job_number'])
    _card_title = ' — '.join(_title_parts) if _title_parts else 'Report'
  %>
  <div class="dash-card">
    <div class="dash-card-header">
      <h5>${ _card_title }</h5>
      <span class="dash-badge badge-completed">Completed</span>
    </div>
    <div class="dash-card-actions">
      <a href="${ interview_url(i='docassemble.quadralocate:data/questions/locate_report.yml', session=item['session']) }" class="btn btn-sm btn-primary">
        <i class="fas fa-eye"></i>&nbsp; View &amp; Download
      </a>
    </div>
  </div>
  % endfor
  % endif

  % if not in_progress and not completed:
  <div class="dash-empty">
    <i class="fas fa-clipboard-list"></i>
    <p>No reports yet. Start your first report above.</p>
  </div>
  % endif

  % if DropboxService.is_configured():
  <div style="margin-top: 2rem; padding-top: 1rem; border-top: 2px solid #e2e8f0;">
    <div class="dash-section-title"><i class="fab fa-dropbox"></i>&nbsp; Dropbox Connection</div>
    % if DropboxService.is_linked():
    <div class="dash-card" style="border-left: 4px solid #28a745;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <i class="fas fa-check-circle" style="color:#28a745;"></i>&nbsp;
          <strong>Dropbox connected.</strong> Reports can be saved directly to your Dropbox.
        </div>
        <a href="${ url_action('unlink_dropbox') }" class="btn btn-sm btn-outline-danger">
          <i class="fas fa-unlink"></i>&nbsp; Disconnect
        </a>
      </div>
    </div>
    % else:
    <div class="dash-card" style="border-left: 4px solid #ffc107;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <i class="fas fa-exclamation-circle" style="color:#ffc107;"></i>&nbsp;
          <strong>Dropbox not connected.</strong> Link your account to save reports to Dropbox.
        </div>
        <a href="${ url_action('link_dropbox') }" class="btn btn-sm btn-primary">
          <i class="fab fa-dropbox"></i>&nbsp; Link Dropbox
        </a>
      </div>
    </div>
    % endif
  </div>
  % endif
buttons:
  - Refresh: refresh
---
# ============================================
# DROPBOX — Link / Unlink actions
# ============================================
event: link_dropbox
code: |
  # Start Dropbox OAuth2 flow (no-redirect / manual code entry)
  try:
    import dropbox
    _app_key = DropboxService._get_app_key()
    _app_secret = DropboxService._get_app_secret()
    if _app_key:
      from dropbox import DropboxOAuth2FlowNoRedirect
      _flow = DropboxOAuth2FlowNoRedirect(
        consumer_key=_app_key,
        consumer_secret=_app_secret,
        token_access_type='offline',
      )
      dropbox_auth_url = _flow.start()
    else:
      dropbox_auth_url = None
  except Exception as _e:
    log('Dropbox link failed: ' + str(_e), 'warning')
    dropbox_auth_url = None
  force_ask('dropbox_auth_form')
---
question: |
  Link Your Dropbox Account
subquestion: |
  % if dropbox_auth_url:
  **Step 1:** Click the link below to authorize Quadra with your Dropbox account:

  <a href="${ dropbox_auth_url }" target="_blank" class="btn btn-primary">
    <i class="fab fa-dropbox"></i>&nbsp; Authorize on Dropbox
  </a>

  **Step 2:** After authorizing, Dropbox will show you a code. Paste it below:
  % else:
  Dropbox is not properly configured. Please contact your administrator.
  % endif
fields:
  - Authorization code: dropbox_auth_code
    show if:
      code: dropbox_auth_url is not None
continue button field: dropbox_auth_form
continue button label: Complete Link
---
code: |
  if defined('dropbox_auth_code') and dropbox_auth_code:
    _link_ok = DropboxService.complete_auth(dropbox_auth_code)
    if _link_ok:
      dropbox_link_result = 'success'
    else:
      dropbox_link_result = 'failed'
  else:
    dropbox_link_result = 'cancelled'
  undefine('dropbox_auth_code')
  force_ask('dropbox_link_result_screen')
---
event: dropbox_link_result_screen
question: |
  % if dropbox_link_result == 'success':
  Dropbox Connected!
  % else:
  Connection Failed
  % endif
subquestion: |
  % if dropbox_link_result == 'success':
  Your Dropbox account has been linked successfully. You can now save reports
  directly to Dropbox from the report export screen.
  % else:
  There was a problem linking your Dropbox account. Please try again or
  contact your administrator.
  % endif
buttons:
  - Back to Dashboard: dashboard_screen
---
event: unlink_dropbox
code: |
  DropboxService.unlink()
  force_ask('dashboard_screen')
