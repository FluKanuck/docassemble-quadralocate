---
metadata:
  title: Quadra Job Map
  short title: Job Map
  description: Interactive map of completed job locations
  authors:
    - name: Quadra Utility Locating Ltd.
  temporary session: True
---
modules:
  - docassemble.quadralocate.objects
---
features:
  navigation: False
  progress bar: False
  question back button: False
  css: |
    <style>
      .da-page-header { display: none; }
      .da-subquestion { max-width: 100%; padding: 0 1rem; }
      .map-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 0;
        margin-bottom: 0.5rem;
      }
      .map-header h2 {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 700;
        color: #1a3a5c;
      }
      .map-header .btn { border-radius: 8px; font-weight: 600; }
      .map-search {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      .map-search input {
        flex: 1;
        padding: 0.5rem 0.75rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .map-search button {
        padding: 0.5rem 1rem;
        border: none;
        background: #1a3a5c;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      .map-search button:hover { background: #2d5f8a; }
      #job-map {
        width: 100%;
        height: 70vh;
        min-height: 400px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      }
      .map-stats {
        display: flex;
        gap: 1.5rem;
        padding: 0.75rem 0;
        font-size: 0.875rem;
        color: #6c757d;
      }
      .map-stats span { font-weight: 600; color: #333; }
      /* Leaflet popup styling */
      .pin-popup h5 { margin: 0 0 0.25rem; font-size: 1rem; color: #1a3a5c; }
      .pin-popup .pin-meta { font-size: 0.85rem; color: #555; margin-bottom: 0.5rem; }
      .pin-popup .pin-meta div { margin-bottom: 0.15rem; }
      .pin-popup .btn-sm { font-size: 0.8rem; padding: 0.2rem 0.6rem; }
    </style>
---
mandatory: True
code: |
  map_screen
---
event: map_screen
question: |
  &nbsp;
subquestion: |
  <div class="map-header">
    <h2><i class="fas fa-map-marked-alt"></i>&nbsp; Job Map</h2>
    <div>
      <a href="${ interview_url(i='docassemble.quadralocate:data/questions/dashboard.yml') }" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-arrow-left"></i>&nbsp; Dashboard
      </a>
    </div>
  </div>

  <div class="map-search">
    <input type="text" id="map-search-input" placeholder="Search by job number, client, or address..." />
    <button onclick="filterPins()"><i class="fas fa-search"></i>&nbsp; Search</button>
    <button onclick="clearFilter()" style="background: #6c757d;"><i class="fas fa-times"></i>&nbsp; Clear</button>
  </div>

  <div id="job-map"></div>

  <%
    import json
    all_pins = JobMapService.get_all_pins()
    pins_json = json.dumps(all_pins)
    pin_count = len(all_pins)
    # Base URL for serving archived PDFs — use placeholder that JS will replace
    serve_pdf_base = url_action('serve_archived_pdf', job_number='__JOBNUMBER__')
  %>

  <div class="map-stats">
    <div><i class="fas fa-map-pin"></i>&nbsp; <span>${ pin_count }</span> job${ 's' if pin_count != 1 else '' } on map</div>
  </div>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <script>
    // Job pin data from server
    var allPins = ${ pins_json };
    var servePdfBase = "${ serve_pdf_base }";
    var markers = [];
    var map;

    // Initialize map centered on BC, Canada
    document.addEventListener('DOMContentLoaded', function() {
      // Default center: BC, Canada (roughly Vancouver/Lower Mainland)
      map = L.map('job-map').setView([49.25, -123.1], 10);

      // OpenStreetMap tiles (free, no API key)
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
      }).addTo(map);

      // Custom pin icon
      var pinIcon = L.icon({
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
      });

      // Add markers for each pin
      allPins.forEach(function(pin) {
        if (pin.lat && pin.lng) {
          var popup = '<div class="pin-popup">' +
            '<h5>' + escapeHtml(pin.job_number || 'Unknown') + '</h5>' +
            '<div class="pin-meta">' +
            (pin.client_company ? '<div><i class="fas fa-building"></i> ' + escapeHtml(pin.client_company) + '</div>' : '') +
            (pin.site_address ? '<div><i class="fas fa-map-marker-alt"></i> ' + escapeHtml(pin.site_address) + '</div>' : '') +
            (pin.site_visit_date ? '<div><i class="fas fa-calendar"></i> ' + escapeHtml(pin.site_visit_date) + '</div>' : '') +
            '</div>' +
            '<a href="' + servePdfBase.replace('__JOBNUMBER__', encodeURIComponent(pin.job_number || '')) + '" target="_blank" class="btn btn-sm btn-success">' +
            '<i class="fas fa-download"></i> Download Report</a>' +
            '</div>';

          var marker = L.marker([pin.lat, pin.lng], {icon: pinIcon})
            .bindPopup(popup)
            .addTo(map);

          // Store search data on marker for filtering
          marker._pinData = pin;
          markers.push(marker);
        }
      });

      // Fit map to show all markers (if any)
      if (markers.length > 0) {
        var group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
      }

      // Enter key in search box
      document.getElementById('map-search-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') filterPins();
      });
    });

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }

    function filterPins() {
      var query = document.getElementById('map-search-input').value.toLowerCase().trim();
      if (!query) { clearFilter(); return; }

      var matchCount = 0;
      var matchBounds = [];

      markers.forEach(function(marker) {
        var pin = marker._pinData;
        var searchText = [
          pin.job_number || '',
          pin.client_company || '',
          pin.site_address || ''
        ].join(' ').toLowerCase();

        if (searchText.indexOf(query) !== -1) {
          marker.addTo(map);
          matchBounds.push(marker.getLatLng());
          matchCount++;
        } else {
          map.removeLayer(marker);
        }
      });

      // Zoom to matching markers
      if (matchBounds.length > 0) {
        var bounds = L.latLngBounds(matchBounds);
        map.fitBounds(bounds.pad(0.2));
      }
    }

    function clearFilter() {
      document.getElementById('map-search-input').value = '';
      markers.forEach(function(marker) {
        marker.addTo(map);
      });
      if (markers.length > 0) {
        var group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
      }
    }
  </script>
buttons:
  - Refresh Map: refresh
---
# Serve an archived PDF for download (triggered from map pin popup links)
event: serve_archived_pdf
code: |
  _job_num = action_argument('job_number')
  _pdf_path = ReportArchiver.get_archived_path(_job_num) if _job_num else None
  if _pdf_path:
    import os
    with open(_pdf_path, 'rb') as _f:
      response(binaryresponse=_f.read(), content_type='application/pdf', filename=str(_job_num) + '.pdf')
  else:
    response('Report not found for job number: ' + str(_job_num), response_code=404)
