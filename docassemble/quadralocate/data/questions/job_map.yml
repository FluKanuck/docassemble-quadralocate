---
metadata:
  title: Quadra Job Map
  short title: Job Map
  description: Interactive map of completed job locations
  authors:
    - name: Quadra Utility Locating Ltd.
  temporary session: True
---
modules:
  - docassemble.quadralocate.objects
---
features:
  navigation: False
  progress bar: False
  question back button: False
  javascript:
    - https://unpkg.com/leaflet@1.9.4/dist/leaflet.js
  css:
    - https://unpkg.com/leaflet@1.9.4/dist/leaflet.css
    - docassemble.quadralocate:data/static/quadra-theme.css
    - docassemble.quadralocate:data/static/map.css
---
mandatory: True
code: |
  map_screen
---
event: map_screen
question: |
  &nbsp;
subquestion: |
  <div class="quadra-app-header">
    <img src="${ url_of('docassemble.quadralocate:data/static/quadra-logo.png') }" alt="Quadra" class="quadra-logo" />
    <span class="quadra-app-title">Job Map</span>
  </div>
  <div class="map-header">
    <h2><i class="fas fa-map-marked-alt"></i>&nbsp; Job Map</h2>
    <div>
      <a href="${ interview_url(i='docassemble.quadralocate:data/questions/dashboard.yml') }" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-arrow-left"></i>&nbsp; Dashboard
      </a>
    </div>
  </div>

  <%
    all_pins = JobMapService.get_all_pins()
    pin_count = len(all_pins)
    import json
    pins_for_js = [{'job_number': p.get('job_number',''), 'lat': p.get('lat'), 'lng': p.get('lng'), 'site_address': p.get('site_address',''), 'client_company': p.get('client_company',''), 'site_visit_date': p.get('site_visit_date','')} for p in all_pins if p.get('lat') is not None and p.get('lng') is not None]
    pins_json = json.dumps(pins_for_js)
    serve_pdf_base = url_action('serve_archived_pdf', job_number='__JOBNUMBER__')
  %>

  <div class="map-stats">
    <div><i class="fas fa-map-pin"></i>&nbsp; <span>${ pin_count }</span> job${ 's' if pin_count != 1 else '' } on map</div>
  </div>

  <div id="job-map" class="quadra-map-container" data-pins="${ pins_json | h }" data-pdf-base="${ (serve_pdf_base or '') | h }" style="width:100%; height:70vh; min-height:420px; border:1px solid #e2e8f0; border-radius:10px; background:#f8f9fa;"></div>
  % if not pins_for_js:
  <div class="alert alert-warning" role="alert" style="max-width: 900px; margin-top: 0.5rem;">
    No map pins yet. Create pins by completing a report, or click <strong>Sync Existing Reports</strong>.
  </div>
  % endif
  <script>
  (function() {
    function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    var el = document.getElementById('job-map');
    if (!el || typeof L === 'undefined') return;
    var pinsData = el.getAttribute('data-pins');
    var pdfBase = el.getAttribute('data-pdf-base') || '';
    var pins = [];
    try { pins = pinsData ? JSON.parse(pinsData) : []; } catch (e) { return; }
    var map = L.map('job-map').setView([49.2, -123.1], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>' }).addTo(map);
    var bounds = [];
    pins.forEach(function(p) {
      if (p.lat == null || p.lng == null) return;
      var lat = parseFloat(p.lat), lng = parseFloat(p.lng);
      bounds.push([lat, lng]);
      var pdfUrl = pdfBase.replace('__JOBNUMBER__', encodeURIComponent(p.job_number || ''));
      var popupContent = '<div class="pin-popup"><h5>' + esc(p.job_number || 'Job') + '</h5>';
      if (p.client_company) popupContent += '<div class="pin-meta">' + esc(p.client_company) + '</div>';
      if (p.site_address) popupContent += '<div class="pin-meta"><i class="fas fa-map-marker-alt"></i> ' + esc(p.site_address) + '</div>';
      if (p.site_visit_date) popupContent += '<div class="pin-meta">' + esc(p.site_visit_date) + '</div>';
      if (pdfUrl) popupContent += '<a href="' + esc(pdfUrl) + '" target="_blank" class="btn btn-sm btn-primary" style="margin-top:0.5rem;">Download PDF</a>';
      popupContent += '</div>';
      L.marker([lat, lng]).addTo(map).bindPopup(popupContent, { maxWidth: 320 });
    });
    if (bounds.length > 1) map.fitBounds(bounds, { padding: [30, 30] });
    else if (bounds.length === 1) map.setView(bounds[0], 12);
  })();
  </script>

  <div style="margin-top: 1rem; max-width: 1100px;">
    <div class="dash-section-title"><i class="fas fa-list"></i>&nbsp; Jobs</div>
    % if all_pins:
      % for p in all_pins:
        <div class="dash-card" style="padding: 0.75rem 1rem;">
          <div style="display:flex; justify-content:space-between; align-items:center; gap: 0.75rem; flex-wrap: wrap;">
            <div>
              <strong>${ p.get('job_number','') }</strong>
              % if p.get('client_company'):
              — ${ p.get('client_company') }
              % endif
              % if p.get('site_address'):
              <div style="color:#6c757d; font-size:0.9rem;"><i class="fas fa-map-marker-alt"></i>&nbsp; ${ p.get('site_address') }</div>
              % endif
            </div>
            <div style="display:flex; gap:0.5rem; flex-wrap: wrap;">
              <a class="btn btn-sm btn-outline-secondary" href="${ url_action('map_screen', job=p.get('job_number','')) }">View on map</a>
              <a class="btn btn-sm btn-success" target="_blank" href="${ serve_pdf_base.replace('__JOBNUMBER__', p.get('job_number','')) }">Download PDF</a>
            </div>
          </div>
        </div>
      % endfor
    % else:
      <div class="text-muted">No pins yet. Complete a report or click Sync Existing Reports.</div>
    % endif
  </div>
  <div style="margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #e2e8f0;">
    <small class="text-muted">
      Pins are created automatically when reports are completed.
      If you have older reports that don't appear, click Sync to scan for them.
    </small>
  </div>
buttons:
  - Refresh Map: refresh
  - Sync Existing Reports: sync_pins
---
# Sync pins for reports completed before v1.6.0
event: sync_pins
code: |
  # Scan all completed Locate Report sessions and create map pins for any
  # that are missing. This handles reports completed before the map feature
  # was added.
  _raw = interview_list(
    filename='docassemble.quadralocate:data/questions/locate_report.yml',
    exclude_invalid=True
  )
  # Handle both list and (list, next_id) tuple return from interview_list
  _sessions = _raw[0] if isinstance(_raw, (list, tuple)) and len(_raw) > 0 and isinstance(_raw[0], list) else (_raw if isinstance(_raw, list) else [])
  _synced = 0
  _skipped = 0
  for _s in _sessions:
    _tags = _s.get('tags', set()) or set()
    if 'completed' not in _tags:
      continue
    _parsed = parse_locate_report_subtitle(_s.get('subtitle', '') or '')
    job_number = _parsed['job_number']
    client_company = _parsed['client']
    site_address = _parsed['address']
    site_visit_date = _parsed['date']
    if not job_number or job_number == 'New Report' or not site_address:
      _skipped += 1
      continue
    if JobMapService.pin_exists(job_number):
      _skipped += 1
      continue
    _lat, _lng = JobMapService.geocode_address(site_address)
    if _lat is not None and _lng is not None:
      from docassemble.base.util import write_record
      from datetime import datetime
      write_record(JobMapService.RECORD_KEY, {
        'job_number': job_number,
        'site_address': site_address,
        'client_company': client_company,
        'site_visit_date': site_visit_date,
        'lat': _lat,
        'lng': _lng,
        'pdf_filename': job_number + '.pdf',
        'created_at': datetime.now().isoformat(),
      })
      _synced += 1
    else:
      _skipped += 1
    # Brief pause to respect Nominatim rate limit (1 req/sec)
    import time
    time.sleep(1.1)
  sync_result_count = _synced
  sync_skipped_count = _skipped
  force_ask('sync_result_screen')
---
event: sync_result_screen
question: |
  Sync Complete
subquestion: |
  **${ sync_result_count }** new pin${ 's' if sync_result_count != 1 else '' } added to the map.

  % if sync_skipped_count > 0:
  ${ sync_skipped_count } report${ 's' if sync_skipped_count != 1 else '' } skipped (already on map, missing address, or geocoding failed).
  % endif
buttons:
  - Back to Map: map_screen
---
# Serve an archived PDF for download (triggered from map pin popup links)
event: serve_archived_pdf
code: |
  _job_num = action_argument('job_number')
  _pdf_path = ReportArchiver.get_archived_path(_job_num) if _job_num else None
  if _pdf_path:
    try:
      with open(_pdf_path, 'rb') as _f:
        response(binaryresponse=_f.read(), content_type='application/pdf', filename=str(_job_num) + '.pdf')
    except (OSError, IOError) as _e:
      response('Report file could not be read.', response_code=404)
  else:
    response('Report not found for job number: ' + str(_job_num), response_code=404)
